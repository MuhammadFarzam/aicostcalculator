<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API Cost Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>AI API Cost Calculator</h1>

    <label for="model">Select Model</label>
    <select id="model">
      <option value="gpt-4o">GPT-4o</option>
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
    </select>

    <label for="tokens">Tokens per Request</label>
    <input type="number" id="tokens" placeholder="e.g. 2000" value="2000" />

    <label for="requests">Requests per Day</label>
    <input type="number" id="requests" placeholder="e.g. 500" value="500" />

    <label for="days">Days per Month</label>
    <input type="number" id="days" placeholder="e.g. 30" value="30" />

    <button onclick="calculateCost()">Calculate Cost</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
